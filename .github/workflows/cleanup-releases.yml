name: 清理 Release、标签和流程记录

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: '输入 ALL 或 DELETE_ALL_RELEASES 删除所有 GitHub Release、OpenRustdesk-Build-v* 标签和旧 Actions 流程记录。'
        required: true
        default: 'ALL'
        type: string

permissions:
  contents: write
  actions: write

jobs:
  cleanup:
    name: 删除 Release、标签和流程记录
    runs-on: ubuntu-latest
    steps:
      - name: 校验确认文本
        run: |
          set -euo pipefail
          confirm="${{ inputs.confirm }}"
          if [ "$confirm" != "DELETE_ALL_RELEASES" ] && [ "$confirm" != "ALL" ] && [ "$confirm" != "all" ]; then
            echo "确认文本不匹配，不会删除任何内容。"
            echo "请输入 ALL 或 DELETE_ALL_RELEASES。"
            exit 1
          fi

      - name: 删除 Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mapfile -t release_tags < <(gh release list --limit 1000 --json tagName --jq '.[].tagName')

          if [ "${#release_tags[@]}" -eq 0 ]; then
            echo "没有找到 Release。"
          else
            printf '将删除以下 Release:\n'
            printf ' - %s\n' "${release_tags[@]}"

            for tag in "${release_tags[@]}"; do
              echo "删除 Release 和标签：$tag"
              gh release delete "$tag" --cleanup-tag --yes || true
            done
          fi

      - name: 删除残留构建标签
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mapfile -t tag_refs < <(
            gh api repos/${{ github.repository }}/git/matching-refs/tags --paginate --jq '.[].ref' \
              | sed 's#^refs/tags/##' \
              | grep -E '^(OpenRustdesk-Build-v|v)[0-9]+' || true
          )

          if [ "${#tag_refs[@]}" -eq 0 ]; then
            echo "没有找到残留构建标签。"
          else
            printf '将删除以下残留构建标签：\n'
            printf ' - %s\n' "${tag_refs[@]}"

            for tag in "${tag_refs[@]}"; do
              echo "删除标签引用：$tag"
              gh api -X DELETE "repos/${{ github.repository }}/git/refs/tags/$tag" || true
            done
          fi

      - name: 删除旧流程运行记录
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURRENT_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          mapfile -t run_ids < <(
            gh api repos/${{ github.repository }}/actions/runs --paginate --jq '.workflow_runs[].id' || true
          )

          if [ "${#run_ids[@]}" -eq 0 ]; then
            echo "没有找到流程运行记录。"
            exit 0
          fi

          printf '将删除以下流程运行记录，当前流程 %s 除外：\n' "$CURRENT_RUN_ID"
          for run_id in "${run_ids[@]}"; do
            if [ "$run_id" = "$CURRENT_RUN_ID" ]; then
              echo "跳过当前清理流程：$run_id"
              continue
            fi
            echo "删除流程运行记录：$run_id"
            gh api -X DELETE "repos/${{ github.repository }}/actions/runs/$run_id" || true
          done

      - name: 输出清理汇总
        run: |
          echo "清理完成。"
          echo "已删除 Token 权限允许删除的 GitHub Release、构建标签和旧流程运行记录。"
