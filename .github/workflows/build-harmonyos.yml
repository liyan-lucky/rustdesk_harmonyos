name: 构建并发布 HarmonyOS HAP

on:
  workflow_dispatch:
    inputs:
      版本号处理:
        description: "打包前如何处理版本号"
        required: true
        default: "增量版本"
        type: choice
        options:
          - "增量版本"
          - "完整版本"
          - "不改版本"
      跳过包验证:
        description: "true 表示跳过 HAP 包验证；false 表示执行验证"
        required: true
        default: true
        type: boolean
      创建发布:
        description: "true 表示创建 GitHub 标签和 Release；false 只上传 workflow artifact"
        required: true
        default: true
        type: boolean
      arm64核心下载地址:
        description: "arm64 核心下载地址；留空使用最新 Release"
        required: false
        default: ""
        type: string
      arm64核心SHA256:
        description: "arm64 核心 SHA256；留空不校验"
        required: false
        default: ""
        type: string
      x86_64核心下载地址:
        description: "x86_64 核心下载地址；留空使用最新 Release"
        required: false
        default: ""
        type: string
      x86_64核心SHA256:
        description: "x86_64 核心 SHA256；留空不校验"
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  build:
    name: 构建 HAP (${{ matrix.abi }})
    runs-on: ubuntu-latest
    timeout-minutes: 120

    strategy:
      matrix:
        abi: [arm64-v8a, x86_64]

    env:
      CI: "true"
      ARTIFACT_TYPE: "hap"
      VERSION_BUMP: ${{ inputs['版本号处理'] == '完整版本' && 'full' || inputs['版本号处理'] == '不改版本' && 'none' || 'incremental' }}
      PREFLIGHT_ONLY: "false"
      SKIP_PACKAGE_VERIFY: ${{ inputs['跳过包验证'] || true }}
      RUSTDESK_CORE_URL: ${{ inputs['arm64核心下载地址'] || 'https://github.com/liyan-lucky/librustdesk_core/releases/latest/download/librustdesk_core.a' }}
      RUSTDESK_CORE_SHA256: ${{ inputs['arm64核心SHA256'] || '' }}
      RUSTDESK_CORE_X86_64_URL: ${{ inputs['x86_64核心下载地址'] || 'https://github.com/liyan-lucky/librustdesk_core/releases/latest/download/librustdesk_core_x86_64.a' }}
      RUSTDESK_CORE_X86_64_SHA256: ${{ inputs['x86_64核心SHA256'] || '' }}
      RUSTDESK_SIGNING_ZIP_B64: ${{ secrets.RUSTDESK_SIGNING_ZIP_B64 }}
      HARMONYOS_SDK_URL: ${{ secrets.HARMONYOS_SDK_URL || vars.HARMONYOS_SDK_URL }}
      HARMONYOS_FULL_URL: ${{ secrets.HARMONYOS_FULL_URL || vars.HARMONYOS_FULL_URL }}

    steps:
      - name: 拉取仓库
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: 设置 Java 17
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: "17"

      - name: 设置 Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: 安装系统工具
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip zip curl jq python3 rsync

      - name: 设置基础 HarmonyOS SDK
        uses: harmonyos-dev/setup-harmonyos-sdk@0.2.1
        with:
          version: 2.0.0.2

      - name: 校验授权工具链输入
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${HARMONYOS_SDK_URL:-}" ]; then
            echo "缺少 HARMONYOS_SDK_URL。请在 Secret 或 Variable 中配置授权 SDK 压缩包地址。"
            exit 1
          fi
          if [ -z "${HARMONYOS_FULL_URL:-}" ]; then
            echo "缺少 HARMONYOS_FULL_URL。请在 Secret 或 Variable 中配置授权 hvigor/toolchain 压缩包地址。"
            exit 1
          fi

      - name: 安装完整 HarmonyOS SDK
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          SDK_BASE="/home/runner/harmonyos-sdk"
          SDK_ZIP="$RUNNER_TEMP/authorized-sdk.zip"
          SDK_EXTRACT="$RUNNER_TEMP/authorized-sdk"

          rm -rf "$SDK_EXTRACT"
          mkdir -p "$SDK_EXTRACT"

          echo "从授权来源下载完整 HarmonyOS SDK..."
          curl -L --fail --retry 3 --retry-delay 5 -o "$SDK_ZIP" "$HARMONYOS_SDK_URL"
          unzip -oq "$SDK_ZIP" -d "$SDK_EXTRACT"

          SDK_SOURCE=""
          for candidate in \
            "$SDK_EXTRACT" \
            "$SDK_EXTRACT"/* \
            "$SDK_EXTRACT"/default \
            "$SDK_EXTRACT"/sdk/default \
            "$SDK_EXTRACT"/*/default \
            "$SDK_EXTRACT"/*/sdk/default
          do
            if [ -d "$candidate/openharmony" ] || [ -d "$candidate/hms" ] || [ -f "$candidate/sdk-pkg.json" ]; then
              SDK_SOURCE="$candidate"
              break
            fi
          done

          if [ -z "$SDK_SOURCE" ]; then
            echo "未能在压缩包中定位 SDK 根目录。"
            find "$SDK_EXTRACT" -maxdepth 5 -type f | sort | head -120
            exit 1
          fi

          mkdir -p "$SDK_BASE"
          move_sdk_item() {
            local source_path="$1"
            local target_path="$2"
            if [ -e "$source_path" ]; then
              rm -rf "$target_path"
              mv "$source_path" "$target_path"
            fi
          }

          move_sdk_item "$SDK_SOURCE/openharmony" "$SDK_BASE/openharmony"
          if [ -e "$SDK_SOURCE/hms" ]; then
            move_sdk_item "$SDK_SOURCE/hms" "$SDK_BASE/hms"
          elif [ -e "$SDK_SOURCE/HarmonyOS-6.1.1" ]; then
            move_sdk_item "$SDK_SOURCE/HarmonyOS-6.1.1" "$SDK_BASE/hms"
          fi
          move_sdk_item "$SDK_SOURCE/sdk-pkg.json" "$SDK_BASE/sdk-pkg.json"

          if [ ! -e "$SDK_BASE/HarmonyOS-6.1.1" ] && [ -d "$SDK_BASE/hms" ]; then
            ln -s hms "$SDK_BASE/HarmonyOS-6.1.1"
          fi

          rm -f "$SDK_ZIP"
          rm -rf "$SDK_EXTRACT"
          chmod +x "$SDK_BASE/openharmony/toolchains"/* 2>/dev/null || true
          chmod +x "$SDK_BASE/hms/toolchains"/* 2>/dev/null || true
          chmod +x "$SDK_BASE/openharmony/native/build-tools/cmake/bin"/* 2>/dev/null || true
          chmod +x "$SDK_BASE/openharmony/native/llvm/bin"/* 2>/dev/null || true
          chmod +x "$SDK_BASE/openharmony/previewer/common/bin"/* 2>/dev/null || true
          chmod +x "$SDK_BASE/hms/native/build-tools/cmake/bin"/* 2>/dev/null || true
          chmod +x "$SDK_BASE/hms/native/llvm/bin"/* 2>/dev/null || true

          test -f "$SDK_BASE/sdk-pkg.json"
          test -x "$SDK_BASE/openharmony/toolchains/restool"
          test -d "$SDK_BASE/openharmony/native"

      - name: 安装完整 hvigor
        shell: bash
        run: |
          set -euo pipefail
          TOOLS_DIR="/home/runner/harmonyos-sdk/command-line-tools"
          cd "$TOOLS_DIR"
          rm -rf hvigor
          HVIGOR_ZIP="$RUNNER_TEMP/authorized-hvigor.zip"
          echo "从授权来源下载完整 hvigor..."
          curl -L --fail --retry 3 --retry-delay 5 -o "$HVIGOR_ZIP" "$HARMONYOS_FULL_URL"
          unzip -oq "$HVIGOR_ZIP" -d "$TOOLS_DIR"
          find "$TOOLS_DIR/hvigor" -name "hvigorw.js" | head -20
          find "$TOOLS_DIR/hvigor" -name "platform-sdks.js" | head -20

      - name: 定位 HarmonyOS SDK
        shell: bash
        run: |
          SDK_BASE="/home/runner/harmonyos-sdk"
          TOOLS_DIR="$SDK_BASE/command-line-tools"
          echo "DEVECO_SDK_HOME=$SDK_BASE" >> "$GITHUB_ENV"
          echo "OHOS_HVIGOR_SDK_ROOT=$SDK_BASE" >> "$GITHUB_ENV"
          echo "DEVECO_TOOLS_HOME=$TOOLS_DIR" >> "$GITHUB_ENV"
          echo "DEVECO_NODE_EXE=$(command -v node)" >> "$GITHUB_ENV"
          echo "PATH=$TOOLS_DIR/bin:$TOOLS_DIR/ohpm/bin:$TOOLS_DIR/hvigor/bin:$PATH" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$SDK_BASE/hms/toolchains/lib:$SDK_BASE/openharmony/previewer/common/bin:$SDK_BASE/openharmony/ets/build-tools/ets-loader/bin/ark/build/bin:$SDK_BASE/openharmony/toolchains:$SDK_BASE/openharmony/toolchains/lib:$SDK_BASE/hms/native/sysroot/usr/lib/x86_64-linux-ohos:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"
          node -v

      - name: 初始化 ohpm 和 hvigor
        shell: bash
        run: |
          set -e
          SDK_BASE="/home/runner/harmonyos-sdk"
          TOOLS_DIR="$SDK_BASE/command-line-tools"
          export PATH="$TOOLS_DIR/bin:$TOOLS_DIR/ohpm/bin:$TOOLS_DIR/hvigor/bin:$PATH"
          if [ -f "$TOOLS_DIR/ohpm/bin/init" ]; then chmod +x "$TOOLS_DIR/ohpm/bin/init" && "$TOOLS_DIR/ohpm/bin/init" || true; fi
          if [ -f "$TOOLS_DIR/ohpm/bin/init.sh" ]; then chmod +x "$TOOLS_DIR/ohpm/bin/init.sh" && "$TOOLS_DIR/ohpm/bin/init.sh" || true; fi
          if [ -f "$TOOLS_DIR/hvigor/bin/init" ]; then chmod +x "$TOOLS_DIR/hvigor/bin/init" && "$TOOLS_DIR/hvigor/bin/init" || true; fi
          if [ -f "$TOOLS_DIR/hvigor/bin/init.sh" ]; then chmod +x "$TOOLS_DIR/hvigor/bin/init.sh" && "$TOOLS_DIR/hvigor/bin/init.sh" || true; fi
          if [ -f "$TOOLS_DIR/ohpm/bin/ohpm" ]; then chmod +x "$TOOLS_DIR/ohpm/bin/ohpm" && "$TOOLS_DIR/ohpm/bin/ohpm" -v || true; fi
          if [ -f "$TOOLS_DIR/hvigor/bin/hvigorw.js" ]; then node "$TOOLS_DIR/hvigor/bin/hvigorw.js" --version || true; fi
          if [ -f "oh-package.json5" ]; then "$TOOLS_DIR/ohpm/bin/ohpm" install || true; fi

      - name: 输出调试环境
        shell: bash
        run: |
          echo "DEVECO_SDK_HOME=$DEVECO_SDK_HOME"
          echo "OHOS_HVIGOR_SDK_ROOT=$OHOS_HVIGOR_SDK_ROOT"
          echo "DEVECO_NODE_EXE=$DEVECO_NODE_EXE"
          echo "RUSTDESK_CORE_URL 是否为空？ $([ -z "$RUSTDESK_CORE_URL" ] && echo 是 || echo 否)"
          echo "RUSTDESK_CORE_SHA256 是否为空？ $([ -z "$RUSTDESK_CORE_SHA256" ] && echo 是 || echo 否)"
          echo "RUSTDESK_SIGNING_ZIP_B64 是否为空？ $([ -z "$RUSTDESK_SIGNING_ZIP_B64" ] && echo 是 || echo 否)"

      - name: 构建 HAP
        shell: bash
        env:
          HARMONY_ARTIFACTS_DIR: ${{ runner.temp }}/rustdesk_harmonyos_artifacts
        run: |
          chmod +x scripts/github_build_harmonyos_linux.sh
          scripts/github_build_harmonyos_linux.sh \
            --artifact-type "$ARTIFACT_TYPE" \
            --version-bump "$VERSION_BUMP" \
            --artifacts-dir "$HARMONY_ARTIFACTS_DIR" \
            --abi-filter "${{ matrix.abi }}" \
            $([ "$SKIP_PACKAGE_VERIFY" = "true" ] && echo --skip-package-verify)

      - name: 上传 HarmonyOS 构建产物
        uses: actions/upload-artifact@v7
        with:
          name: harmonyos-hap-${{ matrix.abi }}
          path: ${{ runner.temp }}/rustdesk_harmonyos_artifacts/*.hap
          if-no-files-found: error

  release:
    name: 创建 GitHub Release
    if: ${{ inputs['创建发布'] == true }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: 拉取仓库
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: 下载 arm64 构建产物
        uses: actions/download-artifact@v4
        with:
          name: harmonyos-hap-arm64-v8a
          path: ${{ runner.temp }}/release_artifacts/arm64

      - name: 下载 x86_64 构建产物
        uses: actions/download-artifact@v4
        with:
          name: harmonyos-hap-x86_64
          path: ${{ runner.temp }}/release_artifacts/x86_64

      - name: 准备 Release
        shell: bash
        run: |
          APP_VERSION=$(grep -oP '"versionName"\s*:\s*"\K[^"]+' AppScope/app.json5 | head -1)
          RELEASE_TAG="OpenRustdesk-Build-v${APP_VERSION:-0.0.0}"
          RELEASE_NAME="OpenRustdesk Build v${APP_VERSION:-0.0.0}"
          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=$RELEASE_NAME" >> "$GITHUB_ENV"
          if [ -f CHANGELOG.md ]; then
            VERSION_HEADER="## v${APP_VERSION:-0.0.0}"
            CHANGELOG_BODY=$(awk "/^${VERSION_HEADER}/{found=1; next} /^## v[0-9]/{found=0} found{print}" CHANGELOG.md | head -200)
            if [ -z "$CHANGELOG_BODY" ]; then
              CHANGELOG_BODY=$(awk '/^## v[0-9]/{if(!first){first=1; next} else exit} first' CHANGELOG.md | head -200)
            fi
            echo "CHANGELOG_BODY<<EOF" >> "$GITHUB_ENV"
            echo "$CHANGELOG_BODY" >> "$GITHUB_ENV"
            echo "EOF" >> "$GITHUB_ENV"
          else
            echo "CHANGELOG_BODY=See commit history for details." >> "$GITHUB_ENV"
          fi
          mkdir -p "$RUNNER_TEMP/release_files"
          cp "$RUNNER_TEMP/release_artifacts/arm64/"*.hap "$RUNNER_TEMP/release_files/"
          cp "$RUNNER_TEMP/release_artifacts/x86_64/"*.hap "$RUNNER_TEMP/release_files/"
          ls -lh "$RUNNER_TEMP/release_files/"

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          body: ${{ env.CHANGELOG_BODY }}
          files: |
            ${{ runner.temp }}/release_files/*.hap
