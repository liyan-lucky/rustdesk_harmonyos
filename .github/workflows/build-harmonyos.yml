name: Build HarmonyOS HAP Windows

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: "Version bump mode before packaging"
        required: true
        default: "incremental"
        type: choice
        options:
          - incremental
          - full
          - none
      skip_package_verify:
        description: "Skip package verification"
        required: true
        default: true
        type: boolean
      publish_release:
        description: "Create GitHub tag and release"
        required: true
        default: true
        type: boolean
      core_url:
        description: "arm64 core URL; empty uses the latest release"
        required: false
        default: ""
        type: string
      core_sha256:
        description: "Expected arm64 core SHA256"
        required: false
        default: ""
        type: string
      core_x86_64_url:
        description: "x86_64 core URL; empty uses the latest release"
        required: false
        default: ""
        type: string
      core_x86_64_sha256:
        description: "Expected x86_64 core SHA256"
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build HAP (${{ matrix.abi }})
    runs-on: ubuntu-latest
    timeout-minutes: 120

    strategy:
      matrix:
        abi: [arm64-v8a, x86_64]

    env:
      CI: "true"
      ARTIFACT_TYPE: "hap"
      VERSION_BUMP: ${{ github.event.inputs.version_bump || 'incremental' }}
      PREFLIGHT_ONLY: "false"
      SKIP_PACKAGE_VERIFY: ${{ github.event.inputs.skip_package_verify || 'true' }}

      RUSTDESK_CORE_URL: ${{ inputs.core_url || 'https://github.com/liyan-lucky/librustdesk_core/releases/latest/download/librustdesk_core.a' }}
      RUSTDESK_CORE_SHA256: ${{ inputs.core_sha256 || '' }}
      RUSTDESK_CORE_X86_64_URL: ${{ inputs.core_x86_64_url || 'https://github.com/liyan-lucky/librustdesk_core/releases/latest/download/librustdesk_core_x86_64.a' }}
      RUSTDESK_CORE_X86_64_SHA256: ${{ inputs.core_x86_64_sha256 || '' }}
      RUSTDESK_SIGNING_ZIP_B64: ${{ secrets.RUSTDESK_SIGNING_ZIP_B64 }}
      HARMONYOS_SDK_URL: ${{ secrets.HARMONYOS_SDK_URL || vars.HARMONYOS_SDK_URL || 'https://github.com/liyan-lucky/rustdesk_harmonyos/releases/download/harmonyos-sdk-full/harmonyos-sdk-full.zip' }}
      HARMONYOS_HVIGOR_URL: ${{ secrets.HARMONYOS_HVIGOR_URL || vars.HARMONYOS_HVIGOR_URL || 'https://github.com/liyan-lucky/rustdesk_harmonyos/releases/download/harmonyos-hvigor-full/harmonyos-hvigor-full.zip' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip zip curl jq python3 rsync

      - name: Setup HarmonyOS SDK
        uses: harmonyos-dev/setup-harmonyos-sdk@0.2.1
        with:
          version: 2.0.0.2

      - name: Install full HarmonyOS SDK
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          if [ -z "${HARMONYOS_SDK_URL:-}" ]; then
            echo "HARMONYOS_SDK_URL is empty"
            exit 1
          fi

          SDK_BASE="/home/runner/harmonyos-sdk"
          SDK_ZIP="$RUNNER_TEMP/harmonyos-sdk-full.zip"
          SDK_EXTRACT="$RUNNER_TEMP/harmonyos-sdk-full"

          rm -rf "$SDK_EXTRACT"
          mkdir -p "$SDK_EXTRACT"

          echo "Download full HarmonyOS SDK..."
          curl -L --fail --retry 3 --retry-delay 5 -o "$SDK_ZIP" "$HARMONYOS_SDK_URL"

          echo "Unzip full HarmonyOS SDK..."
          unzip -oq "$SDK_ZIP" -d "$SDK_EXTRACT"

          echo "SDK archive directories:"
          find "$SDK_EXTRACT" -maxdepth 3 -type d | sort | head -80

          SDK_SOURCE=""
          for candidate in \
            "$SDK_EXTRACT" \
            "$SDK_EXTRACT"/* \
            "$SDK_EXTRACT"/default \
            "$SDK_EXTRACT"/sdk/default \
            "$SDK_EXTRACT"/*/default \
            "$SDK_EXTRACT"/*/sdk/default
          do
            if [ -d "$candidate/openharmony" ] || [ -d "$candidate/hms" ] || [ -f "$candidate/sdk-pkg.json" ]; then
              SDK_SOURCE="$candidate"
              break
            fi
          done

          if [ -z "$SDK_SOURCE" ]; then
            echo "Could not locate SDK root in archive."
            find "$SDK_EXTRACT" -maxdepth 5 -type f | sort | head -120
            exit 1
          fi

          echo "SDK source: $SDK_SOURCE"
          mkdir -p "$SDK_BASE"

          move_sdk_item() {
            local source_path="$1"
            local target_path="$2"
            if [ -e "$source_path" ]; then
              rm -rf "$target_path"
              mv "$source_path" "$target_path"
            fi
          }

          move_sdk_item "$SDK_SOURCE/openharmony" "$SDK_BASE/openharmony"
          if [ -e "$SDK_SOURCE/hms" ]; then
            move_sdk_item "$SDK_SOURCE/hms" "$SDK_BASE/hms"
          elif [ -e "$SDK_SOURCE/HarmonyOS-6.1.1" ]; then
            move_sdk_item "$SDK_SOURCE/HarmonyOS-6.1.1" "$SDK_BASE/hms"
          fi
          move_sdk_item "$SDK_SOURCE/sdk-pkg.json" "$SDK_BASE/sdk-pkg.json"

          if [ ! -e "$SDK_BASE/HarmonyOS-6.1.1" ] && [ -d "$SDK_BASE/hms" ]; then
            ln -s hms "$SDK_BASE/HarmonyOS-6.1.1"
          fi

          rm -f "$SDK_ZIP"
          rm -rf "$SDK_EXTRACT"

          chmod +x "$SDK_BASE/openharmony/toolchains"/* 2>/dev/null || true
          chmod +x "$SDK_BASE/hms/toolchains"/* 2>/dev/null || true
          chmod +x "$SDK_BASE/openharmony/native/build-tools/cmake/bin"/* 2>/dev/null || true
          chmod +x "$SDK_BASE/openharmony/native/llvm/bin"/* 2>/dev/null || true
          chmod +x "$SDK_BASE/openharmony/previewer/common/bin"/* 2>/dev/null || true
          chmod +x "$SDK_BASE/hms/native/build-tools/cmake/bin"/* 2>/dev/null || true
          chmod +x "$SDK_BASE/hms/native/llvm/bin"/* 2>/dev/null || true

          echo "Check full SDK files..."
          test -f "$SDK_BASE/sdk-pkg.json"
          test -x "$SDK_BASE/openharmony/toolchains/restool"
          test -d "$SDK_BASE/openharmony/native"
          test -f "$SDK_BASE/hms/toolchains/modulecheck/app.json"
          test -f "$SDK_BASE/hms/toolchains/lib/libimage_transcoder_shared.so"
          test -f "$SDK_BASE/openharmony/ets/build-tools/ets-loader/bin/ark/build/bin/libsec_shared.so"
          test -f "$SDK_BASE/openharmony/previewer/common/bin/libcjson.so"
          test -f "$SDK_BASE/openharmony/previewer/common/bin/libsec_shared.so"

          ls -l "$SDK_BASE/openharmony/toolchains/restool"
          ls -ld "$SDK_BASE/openharmony/native" "$SDK_BASE/hms/toolchains/modulecheck"

      - name: Patch full hvigor
        shell: bash
        run: |
          set -e

          if [ -z "$HARMONYOS_HVIGOR_URL" ]; then
            echo "HARMONYOS_HVIGOR_URL is empty"
            exit 1
          fi

          TOOLS_DIR="/home/runner/harmonyos-sdk/command-line-tools"

          cd "$TOOLS_DIR"

          echo "Remove incomplete hvigor..."
          rm -rf hvigor

          echo "Download full hvigor..."
          HVIGOR_ZIP="$RUNNER_TEMP/harmonyos-hvigor-full.zip"
          curl -L --fail --retry 3 --retry-delay 5 -o "$HVIGOR_ZIP" "$HARMONYOS_HVIGOR_URL"

          echo "Unzip full hvigor..."
          unzip -oq "$HVIGOR_ZIP" -d "$TOOLS_DIR"

          echo "Check patched hvigor..."
          find "$TOOLS_DIR/hvigor" -name "hvigorw.js" | head -20
          find "$TOOLS_DIR/hvigor" -name "platform-sdks.js" | head -20

      - name: Locate HarmonyOS SDK
        shell: bash
        run: |
          echo "HOS_SDK_HOME=$HOS_SDK_HOME"
          find /home/runner/harmonyos-sdk -maxdepth 6 -type d | sort || true

          SDK_BASE="/home/runner/harmonyos-sdk"
          TOOLS_DIR="$SDK_BASE/command-line-tools"

          echo "DEVECO_SDK_HOME=$SDK_BASE" >> "$GITHUB_ENV"
          echo "OHOS_HVIGOR_SDK_ROOT=$SDK_BASE" >> "$GITHUB_ENV"
          echo "DEVECO_TOOLS_HOME=$TOOLS_DIR" >> "$GITHUB_ENV"
          echo "DEVECO_NODE_EXE=$(command -v node)" >> "$GITHUB_ENV"
          echo "PATH=$TOOLS_DIR/bin:$TOOLS_DIR/ohpm/bin:$TOOLS_DIR/hvigor/bin:$PATH" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$SDK_BASE/hms/toolchains/lib:$SDK_BASE/openharmony/previewer/common/bin:$SDK_BASE/openharmony/ets/build-tools/ets-loader/bin/ark/build/bin:$SDK_BASE/openharmony/toolchains:$SDK_BASE/openharmony/toolchains/lib:$SDK_BASE/hms/native/sysroot/usr/lib/x86_64-linux-ohos:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"

          node -v

      - name: Init ohpm and hvigor
        shell: bash
        run: |
          set -e

          SDK_BASE="/home/runner/harmonyos-sdk"
          TOOLS_DIR="$SDK_BASE/command-line-tools"

          export PATH="$TOOLS_DIR/bin:$TOOLS_DIR/ohpm/bin:$TOOLS_DIR/hvigor/bin:$PATH"

          echo "TOOLS_DIR=$TOOLS_DIR"

          echo "Listing tool files:"
          find "$TOOLS_DIR" -maxdepth 4 -type f \( -name "init" -o -name "init.sh" -o -name "ohpm" -o -name "hvigorw.js" \) | sort || true

          if [ -f "$TOOLS_DIR/ohpm/bin/init" ]; then
            chmod +x "$TOOLS_DIR/ohpm/bin/init"
            "$TOOLS_DIR/ohpm/bin/init" || true
          fi

          if [ -f "$TOOLS_DIR/ohpm/bin/init.sh" ]; then
            chmod +x "$TOOLS_DIR/ohpm/bin/init.sh"
            "$TOOLS_DIR/ohpm/bin/init.sh" || true
          fi

          if [ -f "$TOOLS_DIR/hvigor/bin/init" ]; then
            chmod +x "$TOOLS_DIR/hvigor/bin/init"
            "$TOOLS_DIR/hvigor/bin/init" || true
          fi

          if [ -f "$TOOLS_DIR/hvigor/bin/init.sh" ]; then
            chmod +x "$TOOLS_DIR/hvigor/bin/init.sh"
            "$TOOLS_DIR/hvigor/bin/init.sh" || true
          fi

          echo "Check ohpm:"
          if [ -f "$TOOLS_DIR/ohpm/bin/ohpm" ]; then
            chmod +x "$TOOLS_DIR/ohpm/bin/ohpm"
            "$TOOLS_DIR/ohpm/bin/ohpm" -v || true
          fi

          echo "Check hvigor:"
          if [ -f "$TOOLS_DIR/hvigor/bin/hvigorw.js" ]; then
            node "$TOOLS_DIR/hvigor/bin/hvigorw.js" --version || true
          fi

          echo "Try install project ohpm dependencies:"
          if [ -f "oh-package.json5" ]; then
            "$TOOLS_DIR/ohpm/bin/ohpm" install || true
          fi

      - name: Debug env
        shell: bash
        run: |
          echo "DEVECO_SDK_HOME=$DEVECO_SDK_HOME"
          echo "OHOS_HVIGOR_SDK_ROOT=$OHOS_HVIGOR_SDK_ROOT"
          echo "DEVECO_NODE_EXE=$DEVECO_NODE_EXE"
          echo "LD_LIBRARY_PATH=${LD_LIBRARY_PATH:-}"
          echo "RUSTDESK_CORE_URL empty? $([ -z "$RUSTDESK_CORE_URL" ] && echo yes || echo no)"
          echo "RUSTDESK_CORE_SHA256 empty? $([ -z "$RUSTDESK_CORE_SHA256" ] && echo yes || echo no)"
          echo "RUSTDESK_SIGNING_ZIP_B64 empty? $([ -z "$RUSTDESK_SIGNING_ZIP_B64" ] && echo yes || echo no)"

      - name: Build HAP
        shell: bash
        env:
          HARMONY_ARTIFACTS_DIR: ${{ runner.temp }}/rustdesk_harmonyos_artifacts
        run: |
          chmod +x scripts/github_build_harmonyos_linux.sh

          scripts/github_build_harmonyos_linux.sh \
            --artifact-type "$ARTIFACT_TYPE" \
            --version-bump "$VERSION_BUMP" \
            --artifacts-dir "$HARMONY_ARTIFACTS_DIR" \
            --abi-filter "${{ matrix.abi }}" \
            --skip-package-verify

      - name: Upload HarmonyOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: harmonyos-hap-${{ matrix.abi }}
          path: ${{ runner.temp }}/rustdesk_harmonyos_artifacts/*.hap
          if-no-files-found: error

  release:
    name: Create GitHub Release
    if: ${{ github.event.inputs.publish_release == 'true' }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: harmonyos-hap-arm64-v8a
          path: ${{ runner.temp }}/release_artifacts/arm64

      - name: Download x86_64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: harmonyos-hap-x86_64
          path: ${{ runner.temp }}/release_artifacts/x86_64

      - name: Prepare release
        shell: bash
        run: |
          APP_VERSION=$(grep -oP '"versionName"\s*:\s*"\K[^"]+' AppScope/app.json5 | head -1)
          RELEASE_TAG="OpenRustdesk-Build-v${APP_VERSION:-0.0.0}"
          RELEASE_NAME="OpenRustdesk Build v${APP_VERSION:-0.0.0}"

          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=$RELEASE_NAME" >> "$GITHUB_ENV"

          if [ -f CHANGELOG.md ]; then
            VERSION_HEADER="## v${APP_VERSION:-0.0.0}"
            CHANGELOG_BODY=$(awk "/^${VERSION_HEADER}/{found=1; next} /^## v[0-9]/{found=0} found{print}" CHANGELOG.md | head -200)
            if [ -z "$CHANGELOG_BODY" ]; then
              CHANGELOG_BODY=$(awk '/^## v[0-9]/{if(!first){first=1; next} else exit} first' CHANGELOG.md | head -200)
            fi
            echo "CHANGELOG_BODY<<EOF" >> "$GITHUB_ENV"
            echo "$CHANGELOG_BODY" >> "$GITHUB_ENV"
            echo "EOF" >> "$GITHUB_ENV"
          else
            echo "CHANGELOG_BODY=See commit history for details." >> "$GITHUB_ENV"
          fi

          mkdir -p "$RUNNER_TEMP/release_files"
          cp "$RUNNER_TEMP/release_artifacts/arm64/"*.hap "$RUNNER_TEMP/release_files/"
          cp "$RUNNER_TEMP/release_artifacts/x86_64/"*.hap "$RUNNER_TEMP/release_files/"

          echo "Release files:"
          ls -lh "$RUNNER_TEMP/release_files/"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          body: ${{ env.CHANGELOG_BODY }}
          files: |
            ${{ runner.temp }}/release_files/*.hap
