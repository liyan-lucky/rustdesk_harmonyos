name: 清理 GitHub 运行记录和标签

on:
  workflow_dispatch:
    inputs:
      执行删除:
        description: "默认 false 只预览；改成 true 才会真正删除"
        required: true
        default: false
        type: boolean
      清理运行记录:
        description: "是否清理其他脚本/流程的 GitHub Actions 运行记录"
        required: true
        default: true
        type: boolean
      清理标签:
        description: "是否清理已发布的所有 Git 标签"
        required: true
        default: true
        type: boolean
      删除发布内容:
        description: "危险选项：默认 false 保留 Release 和附件；true 会删除 Release 和附件"
        required: true
        default: false
        type: boolean
      只清理失败取消超时:
        description: "false 清理全部运行记录；true 只清理失败/取消/超时记录"
        required: true
        default: false
        type: boolean
      最多清理运行记录数:
        description: "最多清理多少条运行记录：留空表示不限制"
        required: false
        default: ""
        type: string
      保留最新标签数:
        description: "保留最新几个标签：0 表示不保留，默认清理全部标签"
        required: false
        default: "0"
        type: string
      保留标签规则:
        description: "按规则保留标签：可填正则，例如 ^v[0-9]+\\.；留空表示不按规则保留"
        required: false
        default: ""
        type: string

permissions:
  actions: write
  contents: write

jobs:
  cleanup:
    name: 清理 Actions 运行记录和 Git 标签
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 拉取仓库
        uses: actions/checkout@v4

      - name: 执行清理脚本
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_EXECUTE: ${{ inputs['执行删除'] }}
          INPUT_CLEAN_RUNS: ${{ inputs['清理运行记录'] }}
          INPUT_CLEAN_TAGS: ${{ inputs['清理标签'] }}
          INPUT_DELETE_RELEASES: ${{ inputs['删除发布内容'] }}
          INPUT_FAILED_ONLY: ${{ inputs['只清理失败取消超时'] }}
          INPUT_MAX_RUNS: ${{ inputs['最多清理运行记录数'] }}
          INPUT_KEEP_LATEST_TAGS: ${{ inputs['保留最新标签数'] }}
          INPUT_KEEP_TAG_PATTERN: ${{ inputs['保留标签规则'] }}
        shell: bash
        run: |
          set -euo pipefail

          args=(--repo "$GITHUB_REPOSITORY" --exclude-run-id "$GITHUB_RUN_ID")

          if [ "$INPUT_EXECUTE" = "true" ]; then
            args+=(--yes)
          fi

          if [ "$INPUT_CLEAN_RUNS" != "true" ]; then
            args+=(--no-runs)
          fi

          if [ "$INPUT_CLEAN_TAGS" != "true" ]; then
            args+=(--no-tags)
          fi

          if [ "$INPUT_DELETE_RELEASES" = "true" ]; then
            args+=(--delete-releases)
          fi

          if [ "$INPUT_FAILED_ONLY" = "true" ]; then
            args+=(--failed-only)
          fi

          if [ -n "$INPUT_MAX_RUNS" ]; then
            args+=(--max-runs "$INPUT_MAX_RUNS")
          fi

          if [ -n "$INPUT_KEEP_LATEST_TAGS" ]; then
            args+=(--keep-latest-tags "$INPUT_KEEP_LATEST_TAGS")
          fi

          if [ -n "$INPUT_KEEP_TAG_PATTERN" ]; then
            args+=(--keep-tag-pattern "$INPUT_KEEP_TAG_PATTERN")
          fi

          echo "即将执行参数：${args[*]}"
          bash scripts/cleanup_github_history.sh "${args[@]}"
