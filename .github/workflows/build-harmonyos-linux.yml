name: 构建 HarmonyOS HAP Linux

on:
  push:
    branches: [master]
    paths-ignore:
      - "docs/**"
      - "**.md"
  workflow_dispatch:
    inputs:
      版本号处理:
        description: "打包前如何处理版本号"
        required: true
        default: "增量版本"
        type: choice
        options:
          - "增量版本"
          - "完整版本"
          - "不改版本"
      只检查环境:
        description: "true 表示只做环境检查，不真正构建 HAP"
        required: true
        default: false
        type: boolean
      跳过包验证:
        description: "true 表示跳过 HAP 包验证；false 表示执行验证"
        required: true
        default: true
        type: boolean
      arm64核心下载地址:
        description: "arm64 核心下载地址；留空使用最新 Release"
        required: false
        default: ""
        type: string
      arm64核心SHA256:
        description: "arm64 核心 SHA256；留空不校验"
        required: false
        default: ""
        type: string
      x86_64核心下载地址:
        description: "x86_64 核心下载地址；留空使用最新 Release"
        required: false
        default: ""
        type: string
      x86_64核心SHA256:
        description: "x86_64 核心 SHA256；留空不校验"
        required: false
        default: ""
        type: string

jobs:
  build:
    name: 构建 HAP Linux (${{ matrix.abi }})
    runs-on: ubuntu-latest
    timeout-minutes: 120

    strategy:
      matrix:
        abi: [arm64-v8a, x86_64]

    env:
      CI: "true"
      ARTIFACT_TYPE: "hap"
      VERSION_BUMP: ${{ inputs['版本号处理'] == '完整版本' && 'full' || inputs['版本号处理'] == '不改版本' && 'none' || 'incremental' }}
      PREFLIGHT_ONLY: ${{ inputs['只检查环境'] || false }}
      SKIP_PACKAGE_VERIFY: ${{ inputs['跳过包验证'] || true }}
      RUSTDESK_CORE_URL: ${{ inputs['arm64核心下载地址'] || 'https://github.com/liyan-lucky/librustdesk_core/releases/latest/download/librustdesk_core.a' }}
      RUSTDESK_CORE_SHA256: ${{ inputs['arm64核心SHA256'] || '' }}
      RUSTDESK_CORE_X86_64_URL: ${{ inputs['x86_64核心下载地址'] || 'https://github.com/liyan-lucky/librustdesk_core/releases/latest/download/librustdesk_core_x86_64.a' }}
      RUSTDESK_CORE_X86_64_SHA256: ${{ inputs['x86_64核心SHA256'] || '' }}
      RUSTDESK_SIGNING_ZIP_B64: ${{ secrets.RUSTDESK_SIGNING_ZIP_B64 }}
      SDK_REPO: liyan-lucky/HarmonyOS_SDK_Tools
      SDK_TAG: linux_command_line_tool_6.1.1
      SDK_ASSET: linux-harmonyos-command-line-tool-full.7z

    steps:
      - name: 拉取仓库
        uses: actions/checkout@v7

      - name: 设置 Java 17
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: "17"

      - name: 设置 Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: 安装系统工具
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip zip p7zip-full curl jq python3 rsync

      - name: 设置基础 HarmonyOS SDK
        uses: harmonyos-dev/setup-harmonyos-sdk@0.2.1
        with:
          version: 2.0.0.2

      - name: 校验 SDK Token 输入
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.HARMONYOS_SDK_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "缺少 HARMONYOS_SDK_TOKEN。请在仓库 Secrets 中配置可读取私有 SDK 仓库的 Token。"
            exit 1
          fi

      - name: 安装完整 HarmonyOS SDK
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.HARMONYOS_SDK_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          SDK_BASE="/home/runner/harmonyos-sdk"
          SDK_ARCHIVE="$RUNNER_TEMP/$SDK_ASSET"
          SDK_EXTRACT="$RUNNER_TEMP/authorized-sdk"
          TOOLS_DIR="$SDK_BASE/command-line-tools"

          rm -rf "$SDK_EXTRACT"
          mkdir -p "$SDK_EXTRACT"

          echo "从私有 SDK 仓库下载完整 HarmonyOS SDK：$SDK_REPO / $SDK_TAG / $SDK_ASSET"
          gh release download "$SDK_TAG" \
            --repo "$SDK_REPO" \
            --pattern "$SDK_ASSET" \
            --dir "$RUNNER_TEMP"

          if [ ! -f "$SDK_ARCHIVE" ]; then
            echo "SDK 资产未下载成功：$SDK_ARCHIVE"
            ls -la "$RUNNER_TEMP"
            exit 1
          fi

          echo "解压完整 HarmonyOS SDK..."
          case "$SDK_ASSET" in
            *.zip)
              unzip -oq "$SDK_ARCHIVE" -d "$SDK_EXTRACT"
              ;;
            *.7z)
              7z x -y "$SDK_ARCHIVE" -o"$SDK_EXTRACT"
              ;;
            *)
              echo "不支持的 SDK 压缩包格式：$SDK_ASSET"
              exit 1
              ;;
          esac

          SDK_SOURCE=""
          for candidate in \
            "$SDK_EXTRACT" \
            "$SDK_EXTRACT"/* \
            "$SDK_EXTRACT"/default \
            "$SDK_EXTRACT"/sdk/default \
            "$SDK_EXTRACT"/*/default \
            "$SDK_EXTRACT"/*/sdk/default \
            "$SDK_EXTRACT"/*/*/sdk/default
          do
            if [ -d "$candidate/openharmony" ] || [ -d "$candidate/hms" ] || [ -f "$candidate/sdk-pkg.json" ]; then
              SDK_SOURCE="$candidate"
              break
            fi
          done

          if [ -z "$SDK_SOURCE" ]; then
            SDK_SOURCE=$(find "$SDK_EXTRACT" -maxdepth 6 -type f -name sdk-pkg.json -print -quit | xargs -r dirname || true)
          fi

          if [ -z "$SDK_SOURCE" ]; then
            echo "未能在压缩包中定位 SDK 根目录。"
            find "$SDK_EXTRACT" -maxdepth 5 -type f | sort | head -120
            exit 1
          fi

          TOOLS_SOURCE=""
          for candidate in \
            "$SDK_EXTRACT"/command-line-tools \
            "$SDK_EXTRACT"/*/command-line-tools \
            "$SDK_EXTRACT"/*/*/command-line-tools
          do
            if [ -d "$candidate" ]; then
              TOOLS_SOURCE="$candidate"
              break
            fi
          done

          if [ -z "$TOOLS_SOURCE" ]; then
            TOOLS_SOURCE=$(find "$SDK_EXTRACT" -maxdepth 6 -type d -name command-line-tools -print -quit || true)
          fi

          rm -rf "$SDK_BASE"
          mkdir -p "$SDK_BASE"

          move_sdk_item() {
            local source_path="$1"
            local target_path="$2"
            if [ -e "$source_path" ]; then
              rm -rf "$target_path"
              mv "$source_path" "$target_path"
            fi
          }

          move_sdk_item "$SDK_SOURCE/openharmony" "$SDK_BASE/openharmony"
          if [ -e "$SDK_SOURCE/hms" ]; then
            move_sdk_item "$SDK_SOURCE/hms" "$SDK_BASE/hms"
          elif [ -e "$SDK_SOURCE/HarmonyOS-6.1.1" ]; then
            move_sdk_item "$SDK_SOURCE/HarmonyOS-6.1.1" "$SDK_BASE/hms"
          fi
          move_sdk_item "$SDK_SOURCE/sdk-pkg.json" "$SDK_BASE/sdk-pkg.json"

          if [ -n "$TOOLS_SOURCE" ] && [ -d "$TOOLS_SOURCE" ]; then
            rm -rf "$TOOLS_DIR"
            mkdir -p "$(dirname "$TOOLS_DIR")"
            mv "$TOOLS_SOURCE" "$TOOLS_DIR"
          fi

          if [ ! -e "$SDK_BASE/HarmonyOS-6.1.1" ] && [ -d "$SDK_BASE/hms" ]; then
            ln -s hms "$SDK_BASE/HarmonyOS-6.1.1"
          fi

          rm -f "$SDK_ARCHIVE"
          rm -rf "$SDK_EXTRACT"
          chmod +x "$SDK_BASE/openharmony/toolchains"/* 2>/dev/null || true
          chmod +x "$SDK_BASE/hms/toolchains"/* 2>/dev/null || true
          chmod +x "$SDK_BASE/openharmony/native/build-tools/cmake/bin"/* 2>/dev/null || true
          chmod +x "$SDK_BASE/openharmony/native/llvm/bin"/* 2>/dev/null || true
          chmod +x "$SDK_BASE/openharmony/previewer/common/bin"/* 2>/dev/null || true
          chmod +x "$SDK_BASE/hms/native/build-tools/cmake/bin"/* 2>/dev/null || true
          chmod +x "$SDK_BASE/hms/native/llvm/bin"/* 2>/dev/null || true
          chmod +x "$TOOLS_DIR"/ohpm/bin/* 2>/dev/null || true
          chmod +x "$TOOLS_DIR"/hvigor/bin/* 2>/dev/null || true

          test -f "$SDK_BASE/sdk-pkg.json"
          test -x "$SDK_BASE/openharmony/toolchains/restool"
          test -d "$SDK_BASE/openharmony/native"
          test -d "$TOOLS_DIR"

      - name: 定位 HarmonyOS SDK
        shell: bash
        run: |
          SDK_BASE="/home/runner/harmonyos-sdk"
          echo "DEVECO_SDK_HOME=$SDK_BASE" >> "$GITHUB_ENV"
          echo "OHOS_HVIGOR_SDK_ROOT=$SDK_BASE" >> "$GITHUB_ENV"
          echo "DEVECO_TOOLS_HOME=$SDK_BASE/command-line-tools" >> "$GITHUB_ENV"
          echo "DEVECO_NODE_EXE=$(command -v node)" >> "$GITHUB_ENV"
          echo "PATH=$SDK_BASE/command-line-tools/bin:$SDK_BASE/command-line-tools/ohpm/bin:$SDK_BASE/command-line-tools/hvigor/bin:$PATH" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$SDK_BASE/hms/toolchains/lib:$SDK_BASE/openharmony/previewer/common/bin:$SDK_BASE/openharmony/ets/build-tools/ets-loader/bin/ark/build/bin:$SDK_BASE/openharmony/toolchains:$SDK_BASE/openharmony/toolchains/lib:$SDK_BASE/hms/native/sysroot/usr/lib/x86_64-linux-ohos:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"
          node -v

      - name: 输出调试环境
        shell: bash
        run: |
          echo "DEVECO_SDK_HOME=$DEVECO_SDK_HOME"
          echo "OHOS_HVIGOR_SDK_ROOT=$OHOS_HVIGOR_SDK_ROOT"
          echo "DEVECO_NODE_EXE=$DEVECO_NODE_EXE"
          echo "RUSTDESK_CORE_URL 是否为空？ $([ -z "$RUSTDESK_CORE_URL" ] && echo 是 || echo 否)"
          echo "RUSTDESK_CORE_SHA256 是否为空？ $([ -z "$RUSTDESK_CORE_SHA256" ] && echo 是 || echo 否)"
          echo "RUSTDESK_SIGNING_ZIP_B64 是否为空？ $([ -z "$RUSTDESK_SIGNING_ZIP_B64" ] && echo 是 || echo 否)"

      - name: 构建 HarmonyOS 包
        shell: bash
        env:
          HARMONY_ARTIFACTS_DIR: ${{ runner.temp }}/rustdesk_harmonyos_artifacts
        run: |
          chmod +x scripts/github_build_harmonyos_linux.sh
          args=(
            "--artifact-type" "$ARTIFACT_TYPE"
            "--version-bump" "$VERSION_BUMP"
            "--artifacts-dir" "$HARMONY_ARTIFACTS_DIR"
            "--abi-filter" "${{ matrix.abi }}"
          )
          if [ "$PREFLIGHT_ONLY" = "true" ]; then
            args+=("--preflight-only")
          fi
          if [ "$SKIP_PACKAGE_VERIFY" = "true" ]; then
            args+=("--skip-package-verify")
          fi
          scripts/github_build_harmonyos_linux.sh "${args[@]}"

      - name: 上传 HarmonyOS 构建产物
        if: ${{ inputs['只检查环境'] != true }}
        uses: actions/upload-artifact@v7
        with:
          name: harmonyos-hap-${{ matrix.abi }}
          path: ${{ runner.temp }}/rustdesk_harmonyos_artifacts/*.hap
          if-no-files-found: error
