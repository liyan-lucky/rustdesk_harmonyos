name: Build HarmonyOS Package Linux

on:
  push:
    branches: [master]
    paths-ignore:
      - "docs/**"
      - "**.md"
  workflow_dispatch:
    inputs:
      artifact_type:
        description: "Package type to build"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - hap
          - app
      version_bump:
        description: "Version bump mode before packaging"
        required: true
        default: "incremental"
        type: choice
        options:
          - incremental
          - full
          - none
      preflight_only:
        description: "Run checks only"
        required: true
        default: false
        type: boolean
      skip_package_verify:
        description: "Skip package verification"
        required: true
        default: true
        type: boolean

jobs:
  build:
    name: Build HarmonyOS Linux
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      CI: "true"
      ARTIFACT_TYPE: ${{ github.event.inputs.artifact_type || 'both' }}
      VERSION_BUMP: ${{ github.event.inputs.version_bump || 'incremental' }}
      PREFLIGHT_ONLY: ${{ github.event.inputs.preflight_only || 'false' }}
      SKIP_PACKAGE_VERIFY: ${{ github.event.inputs.skip_package_verify || 'true' }}

      RUSTDESK_CORE_URL: ${{ secrets.RUSTDESK_CORE_URL || vars.RUSTDESK_CORE_URL }}
      RUSTDESK_CORE_SHA256: ${{ secrets.RUSTDESK_CORE_SHA256 || vars.RUSTDESK_CORE_SHA256 }}
      RUSTDESK_SIGNING_ZIP_B64: ${{ secrets.RUSTDESK_SIGNING_ZIP_B64 }}
      HARMONYOS_HVIGOR_URL: ${{ secrets.HARMONYOS_HVIGOR_URL || vars.HARMONYOS_HVIGOR_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip zip curl jq python3 rsync

      - name: Setup HarmonyOS SDK
        uses: harmonyos-dev/setup-harmonyos-sdk@0.2.1
        with:
          version: 2.0.0.2

      - name: Patch full hvigor
        shell: bash
        run: |
          set -e

          if [ -z "$HARMONYOS_HVIGOR_URL" ]; then
            echo "HARMONYOS_HVIGOR_URL is empty"
            exit 1
          fi

          TOOLS_DIR="/home/runner/harmonyos-sdk/command-line-tools"

          cd "$TOOLS_DIR"

          echo "Remove incomplete hvigor..."
          rm -rf hvigor

          echo "Download full hvigor..."
          HVIGOR_ZIP="$RUNNER_TEMP/harmonyos-hvigor-full.zip"
          curl -L --fail --retry 3 -o "$HVIGOR_ZIP" "$HARMONYOS_HVIGOR_URL"

          echo "Unzip full hvigor..."
          unzip -q "$HVIGOR_ZIP" -d "$TOOLS_DIR"

          echo "Check patched hvigor..."
          find "$TOOLS_DIR/hvigor" -name "hvigorw.js" | head -20
          find "$TOOLS_DIR/hvigor" -name "platform-sdks.js" | head -20

      - name: Locate HarmonyOS SDK
        shell: bash
        run: |
          echo "HOS_SDK_HOME=$HOS_SDK_HOME"
          echo "Listing HarmonyOS SDK..."
          find /home/runner/harmonyos-sdk -maxdepth 6 -type d | sort || true

          SDK_BASE="/home/runner/harmonyos-sdk"

          echo "DEVECO_SDK_HOME=$SDK_BASE" >> "$GITHUB_ENV"
          echo "OHOS_HVIGOR_SDK_ROOT=$SDK_BASE" >> "$GITHUB_ENV"
          echo "DEVECO_TOOLS_HOME=$SDK_BASE/command-line-tools" >> "$GITHUB_ENV"
          echo "DEVECO_NODE_EXE=$(command -v node)" >> "$GITHUB_ENV"
          echo "PATH=$SDK_BASE/command-line-tools/bin:$SDK_BASE/command-line-tools/ohpm/bin:$SDK_BASE/command-line-tools/hvigor/bin:$PATH" >> "$GITHUB_ENV"

          echo "DEVECO_SDK_HOME=$SDK_BASE"
          echo "OHOS_HVIGOR_SDK_ROOT=$SDK_BASE"
          echo "DEVECO_TOOLS_HOME=$SDK_BASE/command-line-tools"
          echo "DEVECO_NODE_EXE=$(command -v node)"
          node -v

      - name: Debug env
        shell: bash
        run: |
          echo "DEVECO_SDK_HOME=$DEVECO_SDK_HOME"
          echo "OHOS_HVIGOR_SDK_ROOT=$OHOS_HVIGOR_SDK_ROOT"
          echo "DEVECO_NODE_EXE=$DEVECO_NODE_EXE"
          echo "RUSTDESK_CORE_URL empty? $([ -z "$RUSTDESK_CORE_URL" ] && echo yes || echo no)"
          echo "RUSTDESK_CORE_SHA256 empty? $([ -z "$RUSTDESK_CORE_SHA256" ] && echo yes || echo no)"
          echo "RUSTDESK_SIGNING_ZIP_B64 empty? $([ -z "$RUSTDESK_SIGNING_ZIP_B64" ] && echo yes || echo no)"

      - name: Build HarmonyOS package
        shell: bash
        env:
          HARMONY_ARTIFACTS_DIR: ${{ runner.temp }}/rustdesk_harmonyos_artifacts
        run: |
          chmod +x scripts/github_build_harmonyos_linux.sh

          args=(
            "--artifact-type" "$ARTIFACT_TYPE"
            "--version-bump" "$VERSION_BUMP"
            "--artifacts-dir" "$HARMONY_ARTIFACTS_DIR"
          )

          if [ "$PREFLIGHT_ONLY" = "true" ]; then
            args+=("--preflight-only")
          fi

          if [ "$SKIP_PACKAGE_VERIFY" = "true" ]; then
            args+=("--skip-package-verify")
          fi

          scripts/github_build_harmonyos_linux.sh "${args[@]}"

      - name: Upload HarmonyOS artifacts
        if: ${{ github.event.inputs.preflight_only != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: harmonyos-${{ github.event.inputs.artifact_type || 'both' }}
          path: ${{ runner.temp }}/rustdesk_harmonyos_artifacts/**
          if-no-files-found: error
